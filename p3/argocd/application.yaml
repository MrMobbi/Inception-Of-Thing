apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-cd
  namespace: argocd
spec:
  project: default
  source: 
    repoURL: https://github.com/MrMobbi/Inception-Of-Thing
    targetRevision: HEAD
    path: p3/app
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
